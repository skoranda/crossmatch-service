[pytest]
# Run from the crossmatch/ package root (where manage.py lives), e.g.
#   docker exec crossmatch-celery-worker-1 sh -c 'cd /opt/crossmatch && python -m pytest'
DJANGO_SETTINGS_MODULE = project.settings
python_files = tests.py test_*.py *_tests.py
testpaths = tests brokers
addopts = -p no:cacheprovider
