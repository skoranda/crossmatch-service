common:
  image:
    repo: 585193511743.dkr.ecr.us-west-2.amazonaws.com/scimma/crossmatch-service
    tag: dev
    imagePullPolicy: Always
  uid: 1000
  annotations: {}
    # keel.sh/policy: "force"
    # keel.sh/trigger: "poll"
    # keel.sh/pollSchedule: "@every 10m"

antares_consumer:
  enabled: true
  replicaCount: 1
  service:
    host: "antares-consumer"
  app_root_dir: /opt
  django_debug: "false"
  log_level: "WARNING"
  api_key: ""
  api_secret: ""
  topic: "lsst_scimma_quality_transient"
  group_id: ""
  resources:
    requests:
      cpu: '500m'
      memory: 100Mi
    limits:
      cpu: '2'
      memory: 2Gi

lasair_consumer:
  enabled: true
  replicaCount: 1
  service:
    host: "lasair-consumer"
  kafka_server: "lasair-lsst-kafka.lsst.ac.uk:9092"
  topic: "lasair_366SCiMMA_reliability_moderate"
  group_id: "scimma-crossmatch-prod"
  resources:
    requests:
      cpu: '500m'
      memory: 100Mi
    limits:
      cpu: '2'
      memory: 2Gi

broker_filter:
  # Broker-agnostic; see scimma_crossmatch_service_design.md §2.2.
  # Minimum reliability score (latest diaSource) admitted to ingest.
  # Quoted to preserve exact string; parsed as float in settings.py
  # with a [0.0, 1.0] bounds check.
  min_diasource_reliability: "0.6"

pittgoogle_consumer:
  enabled: true
  # Must be 1: the consumer attaches the SMT JS UDF to the Pub/Sub
  # subscription on every startup via update_subscription. Multi-replica
  # would race on subscription provisioning. See plan
  # docs/plans/2026-04-27-001-feat-pittgoogle-reliability-smt-udf-plan.md
  # § Risks (multi-replica race) for the rolling-deploy crossover note.
  replicaCount: 1
  service:
    host: "pittgoogle-consumer"
  topic: "lsst-alerts-json"
  subscription: "scimma-crossmatch-lsst-alerts-json"
  publisher_project: "pitt-alert-broker"
  resources:
    requests:
      cpu: '500m'
      memory: 100Mi
    limits:
      cpu: '2'
      memory: 2Gi

flower:
  enabled: true
  replicaCount: 1
  flower_unauthenticated_api: false
  port: 5555
  # TODO: Consolidate the ingress spec with the oauth2-proxy config
  ingress:
    hostname: ""
    basePath: flower

celery:
  log_level: "INFO"
  task_time_limit: 129600
  task_soft_time_limit: 129400
  # Remote Dask scheduler address (e.g., tcp://10.0.0.5:8786)
  # Set from K8s service discovery: tcp://${HOPDEVEL_DASK_SCHEDULER_SERVICE_HOST}:${HOPDEVEL_DASK_SCHEDULER_SERVICE_PORT_TCP_COMM}
  dask_scheduler_address: ""
  # Max seconds to wait for the Dask cluster to be reachable AND ≥1 worker
  # registered before the version-drift check fails. Production cluster images
  # bake versions in (no install-at-startup), so the default 300s is generous.
  dask_version_check_timeout_seconds: 300
  beat:
    replicaCount: 1
  workers:
    replicaCount: 2
    concurrency: 4
    resources:
      requests:
        cpu: '1'
        memory: 1Gi
      limits:
        cpu: '4'
        memory: 4Gi

hopskotch:
  broker_url: "kafka://kafka.scimma.org"
  topic: ""
  username: ""
  password: ""

local_kafka:
  enabled: false
  image: scimma/server:latest
  replicas: 0

crossmatch:
  batch_max_wait_seconds: 900
  batch_max_size: 100000
  gaia_hats_url: "s3://stpubdata/gaia/gaia_dr3/public/hats"
  des_hats_url: "s3://stpubdata/mast/public/des/hats/des_y6_gold"
  delve_hats_url: "s3://stpubdata/mast/public/delve/hats/delve_dr3_gold"
  skymapper_hats_url: "https://data.lsdb.io/hats/skymapper_dr4/catalog"
  radius_arcsec: 1.0

database:
  enabled: true
  imageTag: "18.3"
  clusterName: "django-db"
  port: 5432
  initdb:
    database: "scimma_crossmatch_service"
    username: "crossmatch_service_admin"
    existingSecret: "database"
  storage:
    storageClass: "gp2"
    size: "5Gi"

valkey:
  fullnameOverride: "redis"
  service:
    serverPort: 6379
  haMode:
    enabled: false
    replicas: 1
