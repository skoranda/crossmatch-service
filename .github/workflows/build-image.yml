name: Build and publish image

# Builds the crossmatch-service container image and publishes it to the GitLab
# Container Registry on semver release tags. The image is consumed by the
# crossmatch-service-k8s-gitops Helm chart, which pins a released version in its
# values overlay.
#
# Why GitLab and not GHCR: the scimma GitHub org denies the Actions GITHUB_TOKEN
# from pushing org packages (and forbids public GHCR packages). The image is a
# PUBLIC package in the gitops project's GitLab registry, so the Jetstream2
# cluster pulls it anonymously — no pull secret.
#
# Required GitHub Actions secrets (a GitLab deploy token scoped write_registry on
# ncsa-caps-rse/crossmatch-service-k8s-gitops):
#   GITLAB_REGISTRY_USER   — the deploy token username
#   GITLAB_REGISTRY_TOKEN  — the deploy token value

on:
  push:
    tags:
      - "v*.*.*"          # e.g. v0.1.0 -> image tags 0.1.0, 0.1, latest
  workflow_dispatch: {}   # manual run; produces a sha-<shortsha> tag only (no semver)

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to the GitLab registry
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.gitlab.com/ncsa-caps-rse/crossmatch-service-k8s-gitops
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Matches docker/docker-compose.yaml: build context is the Django
          # package dir; the Dockerfile lives outside it under docker/.
          context: crossmatch
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
